<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./css/main.css" />

    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <main class="page">
      <article class="card">
        <figure class="card__media">
          <picture>
            <source
              media="(min-width: 37.5em)"
              srcset="./images/image-product-desktop.jpg"
            />
            <img
              class="card__img"
              src="./images/image-product-mobile.jpg"
              alt="Gabrielle Essence Eau De Parfum perfume bottle surrounded by green leaves"
            />
          </picture>
        </figure>

        <div class="card__content">
          <div class="card__title-group">
            <p class="card__category">Perfume</p>
            <h1 class="card__title">Gabrielle Essence Eau De Parfum</h1>
            <p class="card__description">
              A floral, solar and voluptuous interpretation composed by Olivier
              Polge, Perfumer-Creator for the House of CHANEL.
            </p>
          </div>

          <div class="card__price">
            <span class="card__price-current">$149.99</span>
            <s class="card__price-original">$169.99</s>
          </div>

          <button class="card__btn" type="button">
            <img
              src="./images/icon-cart.svg"
              alt=""
              aria-hidden="true"
              width="18"
              height="18"
            />
            Add to Cart
          </button>
        </div>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noreferrer"
      >
        Frontend Mentor </a
      >. Coded by <a href="#">Diego Becerra</a>.
    </footer>
  </body>
</html>
